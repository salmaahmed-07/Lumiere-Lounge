<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumière Lounge | Admin Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Admin specific styles */
    .admin-container {
      padding: 120px 0 80px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }
    .stats-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: var(--bg-card);
      padding: 24px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.05);
      text-align: center;
    }
    .stat-value {
      font-size: 40px;
      font-family: var(--font-heading);
      color: var(--accent-gold-light);
      margin-bottom: 8px;
    }
    .stat-label {
      color: var(--text-muted);
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.1em;
    }
    .admin-table-container {
      background: var(--bg-card);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .admin-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }
    .admin-table th {
      background: rgba(10, 14, 26, 0.5);
      color: var(--accent-gold);
      padding: 16px 24px;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.1em;
      border-bottom: 1px solid rgba(201, 146, 42, 0.2);
    }
    .admin-table td {
      padding: 16px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: var(--text-main);
    }
    .admin-table tr:last-child td {
      border-bottom: none;
    }
    .admin-table tr:hover {
      background: rgba(255,255,255,0.02);
    }
    .status-badge {
      padding: 4px 12px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-active {
      background: rgba(16, 185, 129, 0.1);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    .status-soon {
      background: rgba(59, 130, 246, 0.1);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.3);
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav id="navbar" style="background: rgba(10, 14, 26, 0.95); box-shadow: 0 4px 20px rgba(0,0,0,0.5);">
    <div class="container">
      <a href="index.html" class="logo">Lumière</a>
      <div class="nav-links">
        <a href="index.html">Back to Main Site</a>
      </div>
    </div>
  </nav>

  <div class="container admin-container">
    <div class="admin-header">
      <h1 class="section-title" style="margin-bottom:0;">Staff Dashboard</h1>
      <button class="btn-primary" onclick="adminApp.refreshData()"><i class="fas fa-sync-alt" style="margin-right:8px;"></i> Refresh Stats</button>
    </div>

    <div class="stats-cards">
      <div class="stat-card">
        <div class="stat-value" id="stat-total-bookings">0</div>
        <div class="stat-label">Total Bookings</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-total-revenue">$0</div>
        <div class="stat-label">Total Revenue</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-occupancy">0%</div>
        <div class="stat-label">Avg Occupancy (Active)</div>
      </div>
    </div>

    <h2 class="section-title" style="font-size:24px; margin-bottom:24px;">Movie Listings & Status</h2>
    <div class="admin-table-container">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Movie Title</th>
            <th>Genre</th>
            <th>Status</th>
            <th>Occupancy</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="admin-movies-tbody">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
